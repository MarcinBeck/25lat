name: Implement via Claude

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'implement'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token:      ${{ secrets.GITHUB_TOKEN }}
          # Kontekst projektu przekazany do Claude
          system_prompt: |
            Jesteś asystentem implementującym zmiany w kampanijnej stronie statycznej Douglas (25 lat w Polsce).
            Projekt: HTML/CSS/JS, deploy na Google Cloud Storage (gs://douglas-25lat-prod).
            Używaj klas i struktur już istniejących w kodzie.
            Zmiany wprowadzaj minimalnie — nie refaktoruj tego, co nie jest wymagane.
            Po implementacji napisz krótkie podsumowanie po polsku w komentarzu do PR.
          direct_prompt: |
            Zaimplementuj poniższe zgłoszenie z Review Tool dla strony Douglas 25lat.
            Przeczytaj najpierw relevantne pliki (index.html, css/style.css, odpowiednie js/*.js),
            następnie wprowadź żądaną zmianę i utwórz PR.

            Tytuł zgłoszenia: ${{ github.event.issue.title }}

            Treść zgłoszenia:
            ${{ github.event.issue.body }}
